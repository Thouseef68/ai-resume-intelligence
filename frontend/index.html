<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Intelligence</title>
</head>

<body style="font-family: Arial; padding: 20px;">

<h2>🚀 AI Resume Intelligence System</h2>

<!-- Upload Resume -->
<label>Upload Resume (PDF):</label><br>
<input type="file" id="resume"><br><br>

<!-- Job Description -->
<label>Job Description:</label><br>
<textarea id="job" rows="8" cols="50"></textarea><br><br>

<button onclick="analyze()">Analyze</button>

<h3>📊 Result:</h3>
<pre id="output"></pre>

<script>
async function analyze() {

    const file = document.getElementById("resume").files[0];
    const job = document.getElementById("job").value;

    if (!file || !job) {
        alert("Upload resume and enter job description");
        return;
    }

    let formData = new FormData();
    formData.append("resume", file);
    formData.append("job_desc", job);

    document.getElementById("output").innerText = "⚡ Processing...";

    try {
        let res = await fetch("https://YOUR-RAILWAY-URL/analyze", {
            method: "POST",
            body: formData
        });

        let data = await res.json();

        document.getElementById("output").innerText =
            "Score: " + data.match_score + "%\n\n" +
            "Skills: " + data.resume_skills + "\n\n" +
            "Missing: " + data.missing_skills + "\n\n" +
            "Feedback:\n" + data.feedback + "\n\n" +
            "Questions:\n" + data.interview_questions;

    } catch (err) {
        document.getElementById("output").innerText = "❌ Error: " + err;
    }
}
</script>

</body>
</html>
